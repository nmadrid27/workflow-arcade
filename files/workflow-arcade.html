const esc = (s)=> String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const colorOf = (k)=> C[k] || k;
function idxOf(id){ return QUESTS.findIndex(q=>q.id===id); }
function unlocked(idx){ return idx===0 || !!state.cleared[QUESTS[idx-1].id]; }
function clearedCount(){ return QUESTS.filter(q=>state.cleared[q.id]).length; }
function currentIdx(){ return QUESTS.findIndex(q=>!state.cleared[q.id]); }
function rungOf(id){ for(const k in RUNGS){ if(RUNGS[k].quests.includes(id)) return RUNGS[k]; } return null; }
function rungDone(r){ return r.quests.every(id=>!!state.cleared[id]); }
function curQuest(){ return QUESTS.find(q=>q.id===state.questId); }
function curStep(){ const q=curQuest(); return q ? q.steps[state.step] : null; }
function padKey(){ return state.questId + ':' + state.step; }

/* ============================================================
   AUDIO: synthesized ambient-chord music (ported from prior app)
   no sound effects, music only, default off
   ============================================================ */
let actx=null, musicTimer=null, musicGain=null, musicStep=0;
const CHORDS = [
  [220.00, 261.63, 329.63, 392.00],
  [196.00, 246.94, 293.66, 349.23],
  [174.61, 220.00, 277.18, 329.63],
  [196.00, 246.94, 293.66, 392.00]
];
function musicCtx(){ const AC = window.AudioContext || window.webkitAudioContext; if(!AC) return null; actx = actx || new AC(); return actx; }
function musicChord(ctx, freqs, t, dur){
  freqs.forEach((f,i)=>{
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = i===0 ? 'sine' : 'triangle';
    o.frequency.value = f;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime((0.9/freqs.length)*state.vol, t+0.5);
    g.gain.linearRampToValueAtTime(0.0001, t+dur);
    o.connect(g).connect(musicGain);
    o.start(t); o.stop(t+dur+0.1);
  });
}
function musicTick(){ const ctx = musicCtx(); if(!ctx) return; const dur = 3.6; musicChord(ctx, CHORDS[musicStep % CHORDS.length], ctx.currentTime, dur); musicStep++; musicTimer = setTimeout(musicTick, dur*1000); }
function startMusic(){ const ctx = musicCtx(); if(!ctx) return; if(ctx.state === 'suspended') ctx.resume(); if(!musicGain){ musicGain = ctx.createGain(); musicGain.connect(ctx.destination); } musicGain.gain.value = state.vol * 0.7; if(!musicTimer) musicTick(); }
function stopMusic(){ if(musicTimer){ clearTimeout(musicTimer); musicTimer = null; } if(musicGain) musicGain.gain.value = 0; }
function toggleMusic(){ state.musicOn = !state.musicOn; persist(); if(state.musicOn) startMusic(); else stopMusic(); announce('Music ' + (state.musicOn?'on':'off')); render(); }
function setMusicVol(v){ state.vol = Math.max(0, Math.min(1, parseFloat(v)||0)); persist(); if(musicGain && state.musicOn) musicGain.gain.value = state.vol * 0.7; }

/* ============================================================
   STYLE-OBJECT -> CSS STRING
   ============================================================ */
function css(obj){
  if(typeof obj==='string') return obj;
  if(!obj) return '';
  let out='';
  for(const k in obj){
    let v=obj[k]; if(v==null) continue;
    const prop=k.replace(/[A-Z]/g, m=>'-'+m.toLowerCase());
    out += prop+':'+v+';';
  }
  return out;
}

/* ---------- QUEST LOG ---------- */
function viewLog(){
  const s=state; const cleared=clearedCount(); const pct=Math.round(cleared/7*100); const curIdx=currentIdx();
  const resumeLabel = curIdx<0 ? 'VIEW CERTIFICATE ★' : ('START QUEST 0'+QUESTS[curIdx].n+' ▸');
  const integrityFillBig = { position:'absolute', inset:0, width:pct+'%', background:'repeating-linear-gradient(90deg,#34d399 0 10px,#2bb985 10px 12px)', boxShadow:'0 0 14px rgba(52,211,153,.5)' };
  const earnedBadges = BADGES.filter(b=>s.badges[b.id]).length;

  const worldsHtml = [1,2,3].map(wn=>{
    const qs = QUESTS.filter(q=>q.world===wn); const acc=WORLDS[wn].accent;
    const open=!!s.openWorlds[wn]; const doneCount=qs.filter(q=>s.cleared[q.id]).length;
    const isActive = qs.some(q=>idxOf(q.id)===curIdx);
    const wrapStyle={ border:'3px solid '+(isActive?'#34d399':(doneCount===qs.length?'#fbbf24':'#2b2b3a')), background:'#0b0a14' };
    const titleStyle={ fontFamily:"'Press Start 2P'", fontSize:'10px', color:acc };
    const headStyle={ display:'flex', alignItems:'center', gap:'12px', padding:'13px 16px', cursor:'pointer', background:'none', border:0, width:'100%', textAlign:'left', color:'inherit', borderBottom: open?'3px solid #1b1830':'0' };
    const statLabel = doneCount+'/'+qs.length + (isActive?' · ACTIVE': (doneCount===qs.length?' ✓':' · LOCKED'));
    let questsHtml='';
    if(open){
      questsHtml = '<div style="padding:12px;display:flex;flex-direction:column;gap:10px;">' + qs.map(q=>{
        const idx=idxOf(q.id); const done=!!s.cleared[q.id]; const unl=unlocked(idx); const current=idx===curIdx;
        let statusLabel, statusStyle, numStyle, rowStyle={ display:'flex', gap:'12px', alignItems:'center', border:'2px solid #2b2b3a', background:'#0d0c18', padding:'11px 13px', cursor: unl?'pointer':'not-allowed' };

        else if(current){ statusLabel='► RESUME'; statusStyle={ fontFamily:"'Press Start 2P'", fontSize:'7px', color:'#0a0912', background:'#22d3ee', padding:'6px 8px', whiteSpace:'nowrap' }; numStyle={ background:'#22d3ee', color:'#0a0912' }; rowStyle={ ...rowStyle, border:'3px solid #22d3ee', background:'#0a141a', boxShadow:'0 0 16px rgba(34,211,238,.22)' }; }
        else if(unl){ statusLabel='START ▸'; statusStyle={ fontFamily:"'Press Start 2P'", fontSize:'7px', color:'#8a8aa2', border:'2px solid #2b2b3a', padding:'5px 7px', whiteSpace:'nowrap' }; numStyle={ background:'#1e1b2e', color:acc }; }
        else { statusLabel='🔒'; statusStyle={ fontSize:'18px' }; numStyle={ background:'#1e1b2e', color:'#54546e' }; rowStyle={ ...rowStyle, opacity:'.62' }; }
        const numStyleFull = { width:'30px', height:'30px', fontFamily:"'Press Start 2P'", fontSize:'10px', display:'grid', placeItems:'center', border:'2px solid #050409', flex:'none', ...numStyle };
        const branchLabel = (q.id==='q3' && s.branch.q3) ? (s.branch.q3==='cowork'?'⊞ COWORK':'▤ MANUAL') : '';
        const branchChip = branchLabel ? `<span style="font-family:'Press Start 2P';font-size:7px;color:#6d6df2;border:2px solid #6d6df2;padding:5px 7px;white-space:nowrap;">${esc(branchLabel)}</span>` : '';
        const titleColor = unl?'#f3f3f9':'#9b9bbd';
        const statusIsGlyph = !unl && !done && !current;
        const statusWord = done?'cleared':(current?'resume':(unl?'start':'locked'));
        return `<button onclick="WA.openQuest('${q.id}')"${unl?'':' aria-disabled="true"'} aria-label="Quest ${q.n}, ${esc(q.title)}, ${statusWord}"${sa(rowStyle)}>
          <span aria-hidden="true"${sa(numStyleFull)}>${q.n}</span>

        </button>`;
      }).join('') + '</div>';
    }
    return `<div${sa(wrapStyle)}>
      <button onclick="WA.toggleWorld(${wn})" aria-expanded="${open}"${sa(headStyle)}>
        <span aria-hidden="true" style="font-family:'Press Start 2P';font-size:9px;color:#8a8aa2;">${open?'▾':'▸'}</span>
        <span${sa(titleStyle)}>WORLD ${wn} · ${esc(WORLDS[wn].name)}</span>
        <span style="margin-left:auto;font-family:'Press Start 2P';font-size:8px;color:#8a8aa2;white-space:nowrap;">${esc(statLabel)}</span>
      </button>
      ${questsHtml}
    </div>`;
  }).join('');

  return `
  <div style="display:grid;grid-template-columns:1fr 296px;gap:0;">
    <div style="padding:20px 22px;display:flex;flex-direction:column;gap:14px;">
      <div style="font-family:'Press Start 2P';font-size:11px;color:#f3f3f9;">QUEST LOG</div>

      <div style="font-family:'Press Start 2P';font-size:8px;color:#34d399;margin-bottom:12px;">STEWARD INTEGRITY</div>
      <div style="height:18px;background:#050409;border:3px solid #2b2b3a;position:relative;margin-bottom:8px;"><div${sa(integrityFillBig)}></div></div>

        <div style="display:flex;justify-content:space-between;border-bottom:1px solid #1b1830;padding-bottom:6px;"><span style="color:#8a8aa2;">XP earned</span><span style="color:#fbbf24;">${s.xp}</span></div>
        <div style="display:flex;justify-content:space-between;"><span style="color:#8a8aa2;">Badges</span><span style="color:#22d3ee;">${earnedBadges} / 8 EARNED</span></div>
      </div>
      <button onclick="WA.resume()" style="width:100%;font-family:'Press Start 2P';font-size:10px;color:#0a0912;background:#ff2d78;border:3px solid #050409;padding:14px;box-shadow:0 6px 0 #7a1038;cursor:pointer;">${esc(resumeLabel)}</button>
    </div>
  </div>`;
}

/* ---------- FIELD GUIDE ---------- */
function viewGuide(){
  const s=state; const guideKeys=Object.keys(s.guide); const guideCount=guideKeys.length;
  const guideList = QUESTS.map(q=>{
    const entries = guideKeys.map(k=>({k, ...s.guide[k]})).filter(g=>g.qid===q.id).sort((a,b)=>a.si-b.si);
    return { qn:q.n, qtitle:q.title, accent:WORLDS[q.world].accent, has:entries.length>0, entries };
  }).filter(g=>g.has);

  const emptyHtml = guideCount===0
    ? `<div style="border:3px dashed #2b2b3a;background:#0b0a14;padding:34px;text-align:center;font-size:19px;color:#8a8aa2;line-height:1.4;">No saved steps yet. Inside any quest, tap <span style="color:#fbbf24;">+ ADD TO GUIDE</span> to keep a step (with your notes and reflection) here.</div>`
    : '';

  const listHtml = guideList.map(g=>{
    const entriesHtml = g.entries.map(e=>{
      const codeBlock = e.code ? `<div style="font-family:'VT323';font-size:18px;color:#34d399;background:#07060d;border:2px solid #1b1830;padding:7px 10px;margin-bottom:8px;">${esc(e.code)}</div>` : '';
      const note = (e.note||'').trim();
      const reflect = (e.reflect||'').trim();
      const noteBlock = note ? `<div style="font-size:17px;color:#c7c7e0;line-height:1.32;margin-bottom:8px;">${esc(note)}</div>` : '';
      const reflectBlock = reflect ? `<div style="font-size:16px;color:#9b9bbd;line-height:1.32;border-left:3px solid #6d6df2;padding-left:10px;">Why this works: ${esc(reflect)}</div>` : '';
      return `<div style="border:3px solid #2b2b3a;background:#0c0b16;padding:13px 15px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:9px;"><span style="font-family:'Press Start 2P';font-size:9px;color:#f3f3f9;line-height:1.4;">${esc(e.h)}</span><button onclick="WA.removeGuide('${esc(e.k)}')" style="margin-left:auto;flex:none;font-family:'Press Start 2P';font-size:7px;color:#8a8aa2;background:#11101e;border:2px solid #2b2b3a;padding:6px 8px;cursor:pointer;">✕ REMOVE</button></div>
        ${codeBlock}${noteBlock}${reflectBlock}
      </div>`;
    }).join('');
    return `<div>
      <div style="font-family:'Press Start 2P';font-size:9px;margin-bottom:11px;color:${g.accent};">QUEST 0${g.qn} · ${esc(g.qtitle)}</div>
      <div style="display:flex;flex-direction:column;gap:10px;">${entriesHtml}</div>
    </div>`;
  }).join('');

  return `
  <div style="padding:24px 26px 30px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
      <span style="font-family:'Press Start 2P';font-size:12px;color:#22d3ee;">FIELD GUIDE</span>
      <div style="display:flex;align-items:center;gap:12px;"><span style="font-family:'Press Start 2P';font-size:9px;color:#8a8aa2;">${guideCount} saved</span><button onclick="WA.exportGuide()" style="font-family:'Press Start 2P';font-size:8px;color:#0a0912;background:#22d3ee;border:2px solid #050409;padding:9px 12px;cursor:pointer;">⤓ EXPORT MD</button></div>
    </div>
    ${emptyHtml}
    <div style="display:flex;flex-direction:column;gap:18px;">${listHtml}</div>
  </div>`;
}

/* ---------- THRESHOLD CROSSED ---------- */
function viewThreshold(){
  const s=state; const r = RUNGS[s.thresholdRung]; if(!r) return viewLog();
  const more = currentIdx()>=0;
  const advancedHtml = THREADS.filter(t=>t.levels.some(lv=>lv.rung===r.n)).map(t=>{
    const lv = t.levels.find(lv=>lv.rung===r.n);
    const rowStyle={ display:'flex', alignItems:'center', gap:'12px', border:'2px solid '+t.color, background:'#0b0a14', padding:'11px 13px' };
    const dotStyle={ width:'12px', height:'12px', flex:'none', background:t.color, boxShadow:'0 0 10px '+t.color };
    const nameStyle={ fontFamily:"'Press Start 2P'", fontSize:'8px', color:t.color, width:'78px', flex:'none' };
    const labelStyle={ fontSize:'17px', color:'#cfcfe6' };
    return `<div${sa(rowStyle)}><span aria-hidden="true"${sa(dotStyle)}></span><span${sa(nameStyle)}>${esc(t.name)}</span><span${sa(labelStyle)}>${esc(lv.label)}</span></div>`;
  }).join('');
  const contLabel = more?'NEXT QUEST ▸':'SEE YOUR FINISH ★';
  const contAction = more?'WA.resume()':'WA.openCert()';
  return `
  <div style="padding:42px 26px 48px;text-align:center;background:radial-gradient(120% 120% at 50% -20%,rgba(109,109,242,.20),transparent 60%);">
    <div style="font-family:'Press Start 2P';font-size:9px;color:#6d6df2;letter-spacing:3px;margin-bottom:16px;animation:wa-pop .25s ease-out;">◆ ◆ ◆  THRESHOLD CROSSED  ◆ ◆ ◆</div>
    <div style="font-family:'Press Start 2P';font-size:8px;color:#34d399;letter-spacing:2px;margin-bottom:20px;">RUNG ${r.n} OF 4 CLEARED</div>
    <div style="max-width:700px;margin:0 auto 16px;font-family:'Press Start 2P';font-size:15px;line-height:1.7;color:#f3f3f9;text-shadow:0 0 18px rgba(109,109,242,.45);">${esc(r.threshold)}</div>
    <p style="max-width:560px;margin:0 auto 30px;font-size:21px;color:#c7c7e0;line-height:1.32;">${esc(r.shift)}</p>
    <div style="max-width:560px;margin:0 auto 32px;text-align:left;">
      <div style="font-family:'Press Start 2P';font-size:8px;color:#8a8aa2;margin-bottom:12px;text-align:center;">THREADS YOU DEEPENED</div>
      <div style="display:flex;flex-direction:column;gap:10px;">${advancedHtml}</div>
    </div>
    <div style="display:flex;gap:12px;justify-content:center;">
      <button onclick="WA.goHome()" style="font-family:'Press Start 2P';font-size:10px;color:#8a8aa2;background:#11101e;border:3px solid #2b2b3a;padding:13px 16px;cursor:pointer;">◂ OVERWORLD MAP</button>
      <button onclick="${contAction}" style="font-family:'Press Start 2P';font-size:10px;color:#0a0912;background:#6d6df2;border:3px solid #050409;padding:13px 18px;box-shadow:0 6px 0 #353596;cursor:pointer;">${esc(contLabel)}</button>
    </div>
  </div>`;
}

/* ---------- ROOT RENDER ---------- */
function viewBody(){
  switch(state.view){
    case 'quest': return viewQuest();
    case 'log': return viewLog();
    case 'badges': return viewBadges();
    case 'cert': return viewCert();
    case 'guide': return viewGuide();
    case 'threshold': return viewThreshold();
    default: return viewHome();
  }
}

function render(){
  const root = document.getElementById('wa-root');
  const active = document.activeElement;
  const activeId = active && active.id;
  const activeSel = (active && (active.tagName==='TEXTAREA'||active.tagName==='INPUT')) ? [active.selectionStart, active.selectionEnd] : null;
  const activeKind = active ? (active.getAttribute && (active.getAttribute('placeholder')||active.getAttribute('aria-label'))||'') : '';

  root.innerHTML = `
  <div style="min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:28px 18px 60px;background:radial-gradient(120% 70% at 80% -10%,rgba(255,45,120,.07),transparent 60%),radial-gradient(100% 70% at -10% 110%,rgba(124,92,255,.08),transparent 55%);">
    <div style="position:relative;width:1120px;max-width:100%;border:3px solid #2a2440;background:#0a0912;box-shadow:0 0 0 6px #07060d,0 22px 60px rgba(0,0,0,.7);overflow:hidden;">
      <div aria-hidden="true" style="position:absolute;inset:0;pointer-events:none;z-index:50;background:repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 1px,transparent 1px 3px);mix-blend-mode:screen;"></div>
      ${topBar()}
      <main id="wa-content" style="position:relative;z-index:20;">
        ${viewBody()}
      </main>
      ${footer()}
    </div>
  </div>`;

  // restore caret in the same logical field (pad/reflection/recall values live in state)
  if(activeKind){
    const candidates = root.querySelectorAll('textarea, input');
    for(const el of candidates){
      const kind = el.getAttribute('placeholder')||el.getAttribute('aria-label')||'';
      if(kind===activeKind){ try{ el.focus(); if(activeSel) el.setSelectionRange(activeSel[0], activeSel[1]); }catch(e){} break; }
    }
  } else if(activeId){
    const el = document.getElementById(activeId); if(el){ try{ el.focus(); }catch(e){} }
  }
}

/* ============================================================
   BOOT
   ============================================================ */
function boot(){
  load();
  render();
  document.addEventListener('keydown', e=>{
    if(state.view!=='quest') return;
    const t=e.target; if(t && (t.tagName==='INPUT'||t.tagName==='TEXTAREA')) return;
    if(e.key==='ArrowRight'){ const q=curQuest(); if(q && state.step<q.steps.length-1){ e.preventDefault(); next(); } }
    else if(e.key==='ArrowLeft'){ if(state.step>0){ e.preventDefault(); back(); } }
  });
  // honor a saved music-on preference on first user gesture (autoplay policy)
  if(state.musicOn){
    const kick = ()=>{ startMusic(); window.removeEventListener('pointerdown',kick); window.removeEventListener('keydown',kick); };
    window.addEventListener('pointerdown', kick);
    window.addEventListener('keydown', kick);
  }
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot); else boot();

})();
</script>
