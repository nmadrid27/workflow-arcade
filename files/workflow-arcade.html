<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Workflow Arcade</title>
<meta name="description" content="A pixel-art learning game that teaches first-time macOS users Claude Code and the Epistemic Stewardship Framework. Seven quests, one HTML file, fully offline tutor." />
<meta property="og:title" content="Workflow Arcade" />
<meta property="og:description" content="Learn Claude Code inside real work: seven pixel-art quests from empty Terminal to a finished, verified, honestly disclosed first project." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://nmadrid27.github.io/workflow-arcade/" />
<meta name="twitter:card" content="summary" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%231a1530'/%3E%3Crect x='2' y='3' width='12' height='11' fill='%235a5390'/%3E%3Crect x='4' y='5' width='8' height='6' fill='%230d0a1c'/%3E%3Crect x='5' y='6' width='2' height='2' fill='%235fd6a6'/%3E%3Crect x='9' y='6' width='2' height='2' fill='%235fd6a6'/%3E%3Crect x='6' y='9' width='4' height='1' fill='%235fd6a6'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;family=VT323&amp;display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1a1530;        /* indigo plum night */
    --bg2:#15102a;
    --panel:#241d3d;
    --panel2:#2c2348;
    --ink:#efe9ff;
    --muted:#9a8fc4;
    --amber:#ffc24b;     /* primary accent */
    --mint:#5fd6a6;      /* secondary accent */
    --rose:#ff8aa5;      /* tertiary accent */
    --outline:#0d0a1c;
    --line:#3a2f5e;
    --cell:13px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    background:
      radial-gradient(120% 80% at 80% -10%, rgba(255,194,75,.10), transparent 60%),
      radial-gradient(100% 80% at -10% 110%, rgba(95,214,166,.10), transparent 55%),
      var(--bg);
    color:var(--ink);
    font-family:'VT323', ui-monospace, monospace;
    font-size:21px;
    line-height:1.35;
    -webkit-font-smoothing:none;
    transition:background .45s linear;
  }
  /* per-world backdrops, keyed to the quest-map zone accents */
  body[data-world="1"]{
    background:
      radial-gradient(120% 80% at 80% -10%, rgba(255,194,75,.20), transparent 60%),
      radial-gradient(100% 80% at -10% 110%, rgba(255,194,75,.09), transparent 55%),
      #1b1430;
  }
  body[data-world="2"]{
    background:
      radial-gradient(120% 80% at 80% -10%, rgba(95,214,166,.18), transparent 60%),
      radial-gradient(100% 80% at -10% 110%, rgba(95,214,166,.09), transparent 55%),
      #131b29;
  }
  body[data-world="3"]{
    background:
      radial-gradient(120% 80% at 80% -10%, rgba(255,138,165,.18), transparent 60%),
      radial-gradient(100% 80% at -10% 110%, rgba(138,120,255,.11), transparent 55%),
      #1e1433;
  }
  .pixel{font-family:'Press Start 2P', ui-monospace, monospace; line-height:1.6;}

  /* hard pixel border + offset shadow */
  .box{
    background:var(--panel);
    border:3px solid var(--outline);
    box-shadow:6px 6px 0 0 var(--outline);
  }
  .scan::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply; opacity:.5;
  }

  /* ---- top bar ---- */
  header{
    display:flex; align-items:center; gap:16px;
    padding:14px 18px;
    border-bottom:3px solid var(--outline);
    background:linear-gradient(var(--panel2),var(--panel));
    position:sticky; top:0; z-index:30;
  }
  .brand{display:flex;align-items:center;gap:12px;cursor:pointer;background:none;border:0;color:inherit;padding:0;text-align:left;}
  .brand .logo{
    width:34px;height:34px;background:var(--amber);border:3px solid var(--outline);
    display:grid;place-items:center;color:var(--outline);font-size:14px;
    box-shadow:3px 3px 0 0 var(--outline);
  }
  .brand h1{font-size:13px;margin:0;color:var(--ink);letter-spacing:1px;}
  .brand small{display:block;font-family:'VT323';font-size:16px;color:var(--muted);letter-spacing:0;}
  .hud{margin-left:auto;display:flex;align-items:center;gap:18px;}
  .xp{display:flex;align-items:center;gap:8px;font-family:'Press Start 2P';font-size:10px;color:var(--amber);}
  .bar{width:140px;height:14px;background:var(--bg2);border:3px solid var(--outline);position:relative;}
  .bar > i{display:block;height:100%;width:0;background:var(--mint);transition:width .4s steps(8);}

  /* ---- layout ---- */
  main{
    display:grid;
    grid-template-columns: 220px 1fr 340px;
    gap:18px; padding:18px; max-width:1280px; margin:0 auto;
    align-items:start;
  }
  h2.pixel{font-size:12px;color:var(--muted);margin:0 0 12px;letter-spacing:1px;}

  /* modules */
  nav.modules{padding:16px;position:relative;}
  .quest{
    display:flex;gap:10px;align-items:flex-start;
    width:100%;padding:10px;margin:0 0 10px;cursor:pointer;color:var(--ink);text-align:left;font-family:'VT323',ui-monospace,monospace;
    border:3px solid transparent;background:var(--panel2);
    transition:transform .06s steps(2);
  }
  .quest:hover{transform:translate(-2px,-2px);border-color:var(--line);}
  .quest.active{border-color:var(--amber);box-shadow:4px 4px 0 0 var(--outline);}
  .quest .num{font-family:'Press Start 2P';font-size:10px;color:var(--amber);margin-top:3px;}
  .quest .t{font-size:19px;line-height:1.1;}
  .quest .s{font-size:15px;color:var(--muted);}
  .quest.locked{opacity:.6;}
  .quest .tag{font-family:'Press Start 2P';font-size:7px;padding:3px 5px;background:var(--bg2);color:var(--rose);border:2px solid var(--outline);}
  .quest .tag.done{color:var(--outline);background:var(--mint);}
  .world{
    display:flex;justify-content:space-between;align-items:center;gap:8px;
    width:100%;padding:10px;margin:0 0 8px;cursor:pointer;text-align:left;
    font-family:'Press Start 2P';font-size:8px;color:var(--amber);
    background:var(--bg2);border:3px solid var(--outline);
  }
  .world:hover{background:var(--panel2);}
  .world .wstat{color:var(--muted);font-size:7px;white-space:nowrap;}
  .wbody{margin:0 0 6px;}

  /* center content */
  section.stage{padding:22px 24px;position:relative;min-height:60vh;}
  .hero{display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;padding:10px 0 6px;}
  .hero h3{font-family:'Press Start 2P';font-size:22px;line-height:1.5;margin:6px 0 0;color:var(--ink);}
  .hero h3 b{color:var(--amber);}
  .hero p{max-width:48ch;color:var(--muted);font-size:21px;margin:0;}
  .hero .pixwrap{filter:drop-shadow(7px 7px 0 var(--outline));}

  .btn{
    font-family:'Press Start 2P';font-size:11px;cursor:pointer;color:var(--outline);
    background:var(--amber);border:3px solid var(--outline);padding:13px 16px;
    box-shadow:5px 5px 0 0 var(--outline);transition:transform .05s steps(2),box-shadow .05s steps(2);
  }
  .btn:hover{transform:translate(-1px,-1px);}
  .btn:active{transform:translate(4px,4px);box-shadow:1px 1px 0 0 var(--outline);}
  .btn.ghost{background:var(--panel2);color:var(--ink);}
  .btn.mint{background:var(--mint);}
  .brand:focus-visible,.quest:focus-visible,.world:focus-visible,.btn:focus-visible,.send:focus-visible,.chat-toggle:focus-visible,
  .codewrap .copy:focus-visible,.resetbtn:focus-visible,.egbtn:focus-visible,.gbtn:focus-visible,.musvol:focus-visible,
  .composer input:focus-visible,.termrow input:focus-visible,.sandbox textarea:focus-visible,
  .certfield input:focus-visible,.mapnode:focus-visible,.rin:focus-visible{
    outline:3px solid var(--mint);outline-offset:3px;
  }
  .branch-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:18px 0;}
  .branch-card{min-height:130px;text-align:left;}
  .branch-card b{display:block;margin-bottom:8px;}

  /* badge case: target-behavior achievements, earned lit and unearned dim */
  .badgewrap{margin:22px 0 6px;text-align:left;}
  .badgehead{font-family:'Press Start 2P';font-size:10px;color:var(--muted);letter-spacing:1px;margin:0 0 12px;}
  .badgegrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;}
  .badge{
    display:flex;flex-direction:column;gap:6px;text-align:left;padding:10px 12px;
    background:var(--panel2);border:3px solid var(--outline);color:var(--muted);opacity:.65;
  }
  .badge .bt{font-family:'Press Start 2P';font-size:7px;line-height:1.5;color:var(--muted);letter-spacing:1px;}
  .badge .bd{font-family:'VT323';font-size:16px;line-height:1.2;}
  .badge.earned{border-color:var(--amber);opacity:1;box-shadow:3px 3px 0 0 var(--outline);}
  .badge.earned .bt{color:var(--amber);}
  .badge.earned .bd{color:var(--ink);}
  .badge .lock{color:var(--rose);}
  @media (max-width:520px){ .badgegrid{grid-template-columns:1fr;} }

  /* quest map: overworld path. Canvas is decoration; nodes are real buttons. */
  .mapwrap{position:relative;max-width:560px;margin:0 auto 6px;}
  #mapcv{display:block;width:100%;height:auto;image-rendering:pixelated;}
  .mapnode{
    position:absolute;transform:translate(-50%,-50%);
    width:34px;height:34px;display:grid;place-items:center;cursor:pointer;
    font-family:'Press Start 2P';font-size:9px;color:var(--ink);
    background:var(--panel2);border:3px solid var(--outline);box-shadow:3px 3px 0 0 var(--outline);
    padding:0;
  }
  .mapnode:hover{transform:translate(-50%,-50%) scale(1.06);}
  .mapnode.cleared{background:var(--mint);color:var(--outline);}
  .mapnode.current{background:var(--amber);color:var(--outline);animation:pulse 1.1s steps(6) infinite;}
  .mapnode .nlabel{
    position:absolute;top:38px;left:50%;transform:translateX(-50%);
    font-family:'VT323';font-size:12px;line-height:1.05;color:var(--muted);
    max-width:70px;text-align:center;pointer-events:none;
  }
  @keyframes pulse{0%{box-shadow:3px 3px 0 0 var(--outline),0 0 0 0 rgba(255,194,75,.55);}100%{box-shadow:3px 3px 0 0 var(--outline),0 0 0 8px rgba(255,194,75,0);}}
  @media (max-width:520px){ .mapnode .nlabel{display:none;} }

  /* completion certificate: name never persisted, rendered to canvas */
  .certfield{display:flex;flex-direction:column;gap:6px;margin:14px 0;max-width:420px;}
  .certfield label{font-family:'Press Start 2P';font-size:8px;color:var(--muted);letter-spacing:1px;}
  .certfield input{
    background:var(--bg2);border:3px solid var(--outline);color:var(--ink);
    font-family:'VT323';font-size:20px;padding:9px 11px;outline:none;
  }
  .certfield input:focus{border-color:var(--mint);}
  #certcv{width:100%;height:auto;border:3px solid var(--outline);box-shadow:6px 6px 0 0 var(--outline);image-rendering:pixelated;margin:6px 0 16px;}

  .lesson h3.title{font-family:'Press Start 2P';font-size:17px;line-height:1.5;color:var(--amber);margin:0 0 4px;}
  .lesson .why{background:var(--panel2);border-left:5px solid var(--mint);padding:12px 14px;margin:14px 0 20px;}
  .lesson .why b{color:var(--mint);font-family:'Press Start 2P';font-size:9px;}
  ol.steps{list-style:none;counter-reset:s;padding:0;margin:0;}
  ol.steps > li{counter-increment:s;display:grid;grid-template-columns:38px 1fr;gap:12px;margin:0 0 18px;}
  ol.steps > li::before{
    content:counter(s,decimal-leading-zero);font-family:'Press Start 2P';font-size:11px;color:var(--outline);
    background:var(--amber);width:38px;height:38px;display:grid;place-items:center;border:3px solid var(--outline);
  }
  ol.steps .st{font-family:'Press Start 2P';font-size:11px;color:var(--ink);margin:6px 0 6px;line-height:1.5;}
  pre.code{
    background:var(--bg2);border:3px solid var(--outline);color:var(--mint);
    padding:12px 14px;overflow:auto;font-size:18px;line-height:1.4;margin:10px 0;
  }
  .codewrap{position:relative;}
  .codewrap .copy{
    position:absolute;top:14px;right:8px;font-family:'Press Start 2P';font-size:7px;cursor:pointer;
    background:var(--panel2);color:var(--ink);border:2px solid var(--outline);padding:5px 7px;
  }
  .codewrap .copy:hover{background:var(--line);}
  .resetbtn{background:none;border:none;color:var(--muted);font-family:'VT323';font-size:16px;cursor:pointer;text-decoration:underline;padding:0;margin-left:10px;}
  .musvol{margin-left:8px;vertical-align:middle;width:84px;accent-color:var(--mint);cursor:pointer;}
  .egwrap{border-top:2px solid var(--line);padding:8px 12px 10px;}
  .egbtn{font-family:'Press Start 2P';font-size:7px;cursor:pointer;background:var(--panel2);color:var(--mint);border:2px solid var(--outline);padding:5px 7px;}
  .egbtn:hover{background:var(--line);}
  .eg{margin-top:8px;color:var(--muted);font-size:18px;line-height:1.3;white-space:pre-wrap;border-left:3px solid var(--mint);padding-left:10px;}
  .egbtn.check{color:var(--amber);margin-right:8px;}
  .bosswrap{margin-top:18px;border-top:3px solid var(--line);padding-top:16px;}
  .bosshead{font-size:12px;color:var(--rose);margin-bottom:6px;}
  .rcard{margin-top:12px;}
  .rin{width:100%;background:var(--bg2);border:2px solid var(--outline);color:var(--ink);font-family:'VT323';font-size:19px;padding:7px 10px;outline:none;}
  .rconf{margin-right:4px;}
  .rconf.sel{background:var(--amber);color:var(--outline);}
  .rfb{margin-top:8px;font-size:18px;}
  .rfb.ok{color:var(--mint);}
  .rfb.miss{color:var(--rose);}
  .padfb{margin-top:8px;font-size:18px;line-height:1.3;}
  .padfb.ok{color:var(--mint);}
  .padfb.miss{color:var(--rose);}
  .gbtn{font-family:'Press Start 2P';font-size:9px;background:var(--panel2);color:var(--mint);border:3px solid var(--outline);padding:9px 11px;cursor:pointer;box-shadow:3px 3px 0 0 var(--outline);}
  .gbtn:hover{transform:translate(-1px,-1px);}
  .gentry{border:3px solid var(--line);padding:12px 14px;margin:0 0 14px;}
  .ftree{background:var(--bg2);color:var(--muted);padding:10px 12px;margin:0;font-family:'VT323';font-size:18px;line-height:1.35;white-space:pre;overflow-x:auto;}
  .ftree b{color:var(--amber);font-weight:normal;}
  .simviz{border-bottom:2px solid var(--line);}
  .lesson .see{color:var(--mint);font-size:17px;margin-top:8px;border-left:3px solid var(--mint);padding-left:10px;}

  /* walkthrough */
  .stepmeta{font-family:'Press Start 2P';font-size:9px;color:var(--muted);margin:6px 0 10px;}
  .stepmeta .pr{color:var(--mint);margin-left:10px;}
  .stepmeta .where{font-size:7px;color:var(--outline);background:var(--amber);border:2px solid var(--outline);padding:3px 5px;margin-right:8px;}
  .wdots{display:flex;gap:6px;margin:8px 0 4px;flex-wrap:wrap;}
  .wdots i{width:14px;height:14px;background:var(--bg2);border:2px solid var(--outline);}
  .wdots i.on{background:var(--amber);}
  .wdots i.pr{background:var(--mint);}
  .walknav{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
  .walknav .btn.next{margin-left:auto;}
  .sandbox{margin-top:18px;border:3px solid var(--outline);background:var(--bg2);}
  .sbtitle{font-family:'Press Start 2P';font-size:8px;color:var(--rose);padding:9px 10px;border-bottom:3px solid var(--outline);background:var(--panel2);display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap;}
  .sbhint{font-family:'VT323';font-size:15px;color:var(--muted);}
  .termout{padding:10px 12px;min-height:54px;max-height:220px;overflow-y:auto;color:var(--mint);font-size:18px;line-height:1.3;white-space:pre-wrap;}
  .termout .cmd{color:var(--ink);}
  .termout .dim{color:var(--muted);}
  .termrow{display:flex;align-items:center;gap:8px;border-top:2px solid var(--line);padding:6px 12px;}
  .termrow .prompt{color:var(--amber);font-size:19px;}
  .termrow input{flex:1;background:transparent;border:none;outline:none;color:var(--ink);font-family:'VT323';font-size:19px;}
  .sandbox textarea{width:100%;min-height:110px;background:transparent;border:none;outline:none;color:var(--ink);font-family:'VT323';font-size:19px;padding:10px 12px;resize:vertical;display:block;}
  .tryit{background:var(--panel2);border:3px dashed var(--rose);padding:12px 14px;margin:18px 0;}
  .tryit b{color:var(--rose);font-family:'Press Start 2P';font-size:9px;}
  .checkpoint{display:flex;align-items:center;gap:14px;margin-top:22px;border-top:3px solid var(--line);padding-top:18px;flex-wrap:wrap;}

  /* PIX panel + chat */
  aside.tutor{padding:0;position:relative;display:flex;flex-direction:column;overflow:hidden;}
  .pixbay{
    position:relative;padding:16px 12px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;
    background:radial-gradient(80% 70% at 50% 30%, rgba(95,214,166,.12), transparent 70%), var(--panel2);
    border-bottom:3px solid var(--outline);
  }
  .pixscreen{position:relative;background:var(--bg2);border:3px solid var(--outline);padding:8px;box-shadow:inset 0 0 0 2px #000;}
  .pixname{font-family:'Press Start 2P';font-size:9px;color:var(--mint);}
  .pixname .dot{color:var(--mint);}
  .log{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:200px;max-height:340px;}
  .msg{max-width:90%;padding:8px 11px;border:3px solid var(--outline);font-size:19px;line-height:1.25;}
  .msg.pix{align-self:flex-start;background:var(--panel2);}
  .msg.me{align-self:flex-end;background:var(--amber);color:var(--outline);}
  .msg .who{font-family:'Press Start 2P';font-size:7px;color:var(--muted);display:block;margin-bottom:5px;letter-spacing:1px;}
  .msg.me .who{color:#6b4e12;}
  .dots span{animation:bp 1s steps(3) infinite;}
  .dots span:nth-child(2){animation-delay:.15s}
  .dots span:nth-child(3){animation-delay:.3s}
  @keyframes bp{0%{opacity:.2}50%{opacity:1}100%{opacity:.2}}
  .composer{display:flex;gap:8px;padding:12px;border-top:3px solid var(--outline);background:var(--panel);}
  .composer input{
    flex:1;background:var(--bg2);border:3px solid var(--outline);color:var(--ink);
    font-family:'VT323';font-size:20px;padding:9px 11px;outline:none;
  }
  .composer input:focus{border-color:var(--mint);}
  .send{font-family:'Press Start 2P';font-size:9px;background:var(--mint);color:var(--outline);border:3px solid var(--outline);padding:0 12px;cursor:pointer;}
  .send:active{transform:translate(2px,2px);}

  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:24px;z-index:60;
    background:var(--mint);color:var(--outline);border:3px solid var(--outline);box-shadow:5px 5px 0 0 var(--outline);
    font-family:'Press Start 2P';font-size:10px;padding:12px 16px;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

  .chat-toggle{display:none;}
  .skip{position:absolute;left:-9999px;top:0;z-index:100;background:var(--amber);color:var(--outline);font-family:'Press Start 2P';font-size:10px;padding:10px 14px;border:3px solid var(--outline);text-decoration:none;}
  .skip:focus{left:10px;top:10px;}
  /* responsive */
  @media (max-width:980px){
    header{flex-wrap:wrap;}
    .hud{margin-left:auto;}
    main{grid-template-columns:1fr;}
    nav.modules{order:2;}
    section.stage{order:1;}
    aside.tutor{
      order:3;position:fixed;right:14px;bottom:78px;width:min(360px,92vw);z-index:50;
      display:none;max-height:70vh;
    }
    aside.tutor.open{display:flex;}
    .chat-toggle{
      display:flex;align-items:center;gap:8px;position:fixed;right:14px;bottom:14px;z-index:55;
      font-family:'Press Start 2P';font-size:10px;background:var(--amber);color:var(--outline);
      border:3px solid var(--outline);box-shadow:5px 5px 0 0 var(--outline);padding:12px 14px;cursor:pointer;
    }
    aside.tutor.open + .chat-toggle{background:var(--rose);}
  }
  @media (max-width:520px){
    header{align-items:flex-start;}
    .brand small{max-width:170px;}
    .hud{width:100%;justify-content:flex-end;}
    .bar{width:110px;}
    .branch-grid{grid-template-columns:1fr;}
    section.stage{padding:18px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important;}
  }
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--line);border:2px solid var(--outline)}
  ::-webkit-scrollbar-track{background:var(--bg2)}
</style>
</head>
<body>
<a class="skip" href="#stage">Skip to quest content</a>
<header>
  <button class="brand" onclick="App.goHome()" aria-label="Workflow Arcade home">
    <div class="logo pixel">A</div>
    <div>

<script>
/* ============================================================
   PIX  -  pixel tutor avatar engine
   Drawn cell-by-cell on a 16x16 grid canvas. State driven.
   States: idle | think | talk | bored | happy. Ambient: blink, bob, yawn.
   Display name: PIXEL. The internal identifier stays PIX.
   ============================================================ */
const PIX = (function(){
  const cv = document.getElementById('pix');
  const ctx = cv.getContext('2d');
  const N = 16, CELL = cv.width / N;
  const C = {
    out:'#0d0a1c', body:'#5a5390', bodHi:'#7d76b8', bodLo:'#3f396b',
    screen:'#0d0a1c', glow:'#5fd6a6', glowHi:'#8af0c4', amber:'#ffc24b', rose:'#ff8aa5'
  };
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let state = 'idle';
  let t0 = performance.now();
  let nextBlink = 1200 + Math.random()*2500;
  let blinkT = 0, blinking = false;
  let mouthPhase = 0;          // talk mouth cycle
  let yawnT = 0, yawning = false;
  let idleSince = performance.now();

  function px(x,y,c){ ctx.fillStyle=c; ctx.fillRect(x*CELL,y*CELL,CELL,CELL); }
  function rect(x0,y0,x1,y1,c){ for(let y=y0;y<=y1;y++) for(let x=x0;x<=x1;x++) px(x,y,c); }

  function setState(s){
    if(s===state) return;
    state=s;
    if(s==='talk') mouthPhase=0;
    if(s==='idle') idleSince=performance.now();
  }

  function draw(now){
    const dt = now - t0; t0 = now;
    ctx.clearRect(0,0,cv.width,cv.height);

    // ambient bob (head + antenna gently float)
    const bobPx = reduce ? 0 : Math.sin(now/520)*2;               // sub-cell vertical drift
    ctx.save();
    ctx.translate(0, bobPx);

    // antenna sway
    const sway = reduce ? 0 : Math.round(Math.sin(now/(state==='think'?260:680)));
    const tipX = 8 + sway;
    px(8,3,C.bodLo); px(8,2,C.bodLo);
    px(tipX,1,state==='think'?C.amber:C.rose);
    px(tipX,0,state==='think'?C.glowHi:C.amber);

    // head body  (cols 2..13, rows 4..14)
    rect(2,4,13,14,C.out);            // outline block
    rect(3,5,12,13,C.body);           // fill
    rect(3,5,12,5,C.bodHi);           // top highlight
    rect(3,6,3,13,C.bodHi);           // left highlight
    rect(12,6,12,13,C.bodLo);         // right shadow
    rect(3,13,12,13,C.bodLo);         // bottom shadow

    // screen inset (cols 4..11, rows 6..12)
    rect(4,6,11,12,C.out);
    rect(5,7,10,11,C.screen);

    // ---- eyes ----
    let eye = state;
    if(blinking) eye='blink';
    drawEyes(eye, now);

    // ---- mouth ----
    drawMouth(now, dt);

    // little ear bolts
    px(1,8,C.bodLo); px(1,9,C.body); px(14,8,C.body); px(14,9,C.bodLo);

    ctx.restore();

    // timers
    handleBlink(now, dt);
    requestAnimationFrame(draw);
  }

  function drawEyes(mode, now){
    const g=C.glow, gh=C.glowHi;
    // eye anchor cells: left(5..6), right(9..10), rows 8..9 nominal
    if(mode==='blink'){
      px(5,9,g);px(6,9,g); px(9,9,g);px(10,9,g);
      return;
    }
    if(mode==='think'){            // look up
      px(5,8,g);px(6,8,gh); px(9,8,g);px(10,8,gh);
      px(5,7,C.glow); px(9,7,C.glow);
      return;
    }
    if(mode==='bored'){            // half-lidded
      px(5,9,g);px(6,9,g); px(9,9,g);px(10,9,g);
      px(5,8,C.bodLo);px(6,8,C.bodLo);px(9,8,C.bodLo);px(10,8,C.bodLo);
      return;
    }
    if(mode==='happy'){            // squint of joy: outer corners up
      px(5,8,gh);px(6,9,g); px(9,9,g);px(10,8,gh);
      return;
    }
    // idle / talk : bright open eyes (2x2) with highlight
    px(5,8,g);px(6,8,gh); px(5,9,g);px(6,9,g);
    px(9,8,g);px(10,8,gh); px(9,9,g);px(10,9,g);
  }

  function drawMouth(now, dt){
    const g=C.glow;
    if(yawning){ rect(6,10,9,11,g); px(7,11,C.screen);px(8,11,C.screen); return; }
    if(state==='talk'){
      mouthPhase += dt;
      const open = Math.floor(mouthPhase/140)%2===0;
      if(open){ rect(6,10,9,10,g); rect(7,11,8,11,g); }
      else { rect(6,10,9,10,g); }
      return;
    }
    if(state==='think'){ rect(7,10,8,10,C.bodLo); return; }
    if(state==='bored'){ rect(6,10,9,10,C.bodLo); return; }
    if(state==='happy'){ rect(6,10,9,10,g); rect(7,11,8,11,g); return; }  // open grin
    // idle smile
    px(6,10,g); rect(7,11,8,11,g); px(9,10,g);
  }

  function handleBlink(now, dt){
    if(reduce) return;
    if(blinking){
      blinkT += dt;
      if(blinkT>120){ blinking=false; blinkT=0; nextBlink = 1400 + Math.random()*3200; }
      return;
    }
    nextBlink -= dt;
    if(nextBlink<=0 && state!=='think' && state!=='happy'){ blinking=true; }

    // bored + yawn logic
    if(state==='idle'){
      const idleMs = now - idleSince;
      if(idleMs>16000){ setState('bored'); }
    }
    if(state==='bored'){
      yawnT += dt;
      if(yawnT>4200 && !yawning){ yawning=true; }
      if(yawning && yawnT>4900){ yawning=false; yawnT=0; }
    } else { yawnT=0; yawning=false; }
  }

  // public api
  function nudge(){ if(state==='bored'){ idleSince=performance.now(); setState('idle'); } }
  let celebrateTimer = null;
  function celebrate(){             // brief happy burst, then back to idle
    setState('happy');
    clearTimeout(celebrateTimer);
    celebrateTimer = setTimeout(()=>{ if(state==='happy') setState('idle'); }, 1800);
  }
  requestAnimationFrame(draw);
  return { setState, nudge, celebrate };
})();

/* ============================================================
   PIXEL GUIDANCE  -  offline scripted guidance.
   ============================================================ */
function fallbackReply(history){
  const last = (history[history.length-1]?.content || "").toLowerCase();
  if(last.includes("start")||last.includes("begin")||last.includes("first"))
    return "Start with quest one. Create a focused project folder, open Claude Code inside it, then run /init to create CLAUDE.md.";
  if(last.includes("init")||last.includes("claude.md")||last.includes("profile"))
    return "CLAUDE.md holds durable project instructions. Make each line actionable, test the profile, then revise what Claude misses.";
  if(last.includes("cowork")||last.includes("plugin"))
    return "The Cowork plugin is the guided ESF path. Open the project folder, run /esf-start, then use /esf-status to reorient.";
  if(last.includes("esf")||last.includes("position"))
    return "ESF keeps your position visible before AI enters. Your thinking comes first, then AI can challenge and support it.";
  if(last.includes("plan mode")||last.includes("permission")||last.includes("interrupt")||last.includes("steer"))
    return "Steering means reading each permission prompt before answering, pressing Esc when the work drifts, and requiring a plan before file changes.";
  if(last.includes("git")||last.includes("commit")||last.includes("diff"))
    return "Git gives you checkpoints. Let Claude run the commands, but read the full diff before you approve any commit.";
  if(last.includes("undo")||last.includes("revert")||last.includes("recover")||last.includes("wrong file"))
    return "Recovery is a sequence: stop with Esc, ask what changed, inspect with git diff, restore the file, then add the rule to CLAUDE.md.";
  if(last.includes("verify")||last.includes("evidence"))
    return "Verification means checking the artifact against criteria and inspecting evidence, not asking AI whether its own answer is correct.";
  if(last.includes("disclosure"))
    return "A useful disclosure says what you directed, what AI contributed, what you changed, and what you verified.";
  const generic = [
    "I am offline guidance, so my answers are scripted. The quests carry the full walkthrough.",
    "Keep the leverage, keep the judgment. Write your position, evaluate suggestions, and verify what ships.",
    "Use the next practice pad to make the decision concrete. A written rule beats a vague intention.",
  ];
  return generic[Math.floor(Math.random()*generic.length)];
}
/* ============================================================
   APP  -  navigation, rendering, XP, chat flow
   ============================================================ */
const App = (function(){
  const stage = document.getElementById('stage');
  const modulesEl = document.getElementById('modules');
  const logEl = document.getElementById('log');
  const inputEl = document.getElementById('chatin');
  const xpEl = document.getElementById('xpval');
  const barEl = document.getElementById('progbar');
  const barWrapEl = barEl.parentElement;
  const toastEl = document.getElementById('toast');
  const statusEl = document.getElementById('status');
  const tutorEl = document.getElementById('tutor');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let xp = 0;
  let done = {};            // completed module ids
  let practiced = {};       // practiced[moduleId] = { stepIndex: true }
  let stepAt = {};          // last viewed walkthrough position per module
  let pads = {};            // practice pad text, keyed moduleId:stepIndex
  let branchChoice = {};    // selected path per branching module
  let openWorlds = {};      // quest-log drawer state per world index
  let guide = [];           // saved field-guide entries, 'moduleId:stepIndex' keys
  let badges = {};          // earned achievement badges, keyed by badge id
  let soundOn = false;      // 8-bit feedback, default off
  let musicOn = false;      // synthesized ambient music, default off
  let musicVol = 45;        // music volume, 0 to 100
  let oriented = false;     // first-run orientation card dismissed
  let recallState = {};     // boss-check recall results, keyed moduleId:itemIndex
  let history = [];         // chat history for scripted guidance
  let busy = false;

  // ---- progress persistence ----
  // Storage is unavailable in some previews. Both functions fail
  // silently so the app runs in-memory when storage is off.
  function loadProgress(){
    try{
      const raw = localStorage.getItem('wa-progress');
      if(!raw) return;
      const p = JSON.parse(raw);
      if(typeof p.xp === 'number') xp = p.xp;
      if(p.done && typeof p.done === 'object') done = p.done;
      if(p.practiced && typeof p.practiced === 'object') practiced = p.practiced;
      if(p.stepAt && typeof p.stepAt === 'object') stepAt = p.stepAt;
      if(p.pads && typeof p.pads === 'object') pads = p.pads;
      if(p.branchChoice && typeof p.branchChoice === 'object') branchChoice = p.branchChoice;
      if(p.openWorlds && typeof p.openWorlds === 'object') openWorlds = p.openWorlds;
      if(Array.isArray(p.guide)) guide = p.guide;
      if(p.badges && typeof p.badges === 'object') badges = p.badges;
      if(typeof p.soundOn === 'boolean') soundOn = p.soundOn;
      if(typeof p.oriented === 'boolean') oriented = p.oriented;
      if(typeof p.musicOn === 'boolean') musicOn = p.musicOn;
      if(typeof p.musicVol === 'number') musicVol = Math.max(0, Math.min(100, p.musicVol));
      if(p.recallState && typeof p.recallState === 'object') recallState = p.recallState;
    }catch(e){ /* storage off: run in-memory */ }
  }
  function saveProgress(){
    try{ localStorage.setItem('wa-progress', JSON.stringify({xp, done, practiced, stepAt, pads, branchChoice, openWorlds, guide, badges, soundOn, oriented, musicOn, musicVol, recallState})); }
    catch(e){ /* storage off: skip */ }
  }

  const esc = s => s.replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

  function questBtn(m, activeId){
    const i = MODULES.indexOf(m);
    const tag = done[m.id] ? '<span class="tag done pixel">CLEARED</span>'
              : m.ready ? '<span class="tag pixel">READY</span>'
              : '<span class="tag pixel">SOON</span>';
    const items = visibleSteps(m);
    const pr = items.filter(({originalIndex})=>(practiced[m.id]||{})[originalIndex]).length;
    return `<button class="quest ${m.ready?'':'locked'} ${activeId===m.id?'active':''}" onclick="App.openModule('${m.id}')" aria-current="${activeId===m.id?'step':'false'}">
      <div class="num">${String(i+1).padStart(2,'0')}</div>
      <div>
        <div class="t">${esc(m.title)}</div>
        <div class="s">${esc(m.sub)}</div>
        ${pr&&!done[m.id]?`<div class="s">${pr} / ${items.length} steps practiced</div>`:''}
        <div style="margin-top:6px">${tag} <span class="tag pixel" style="color:var(--muted)">~${m.min} MIN</span></div>
      </div>
    </button>`;
  }

  const worldOf = id => WORLDS.findIndex(w=>w.ids.includes(id));
  let lastActive = null;

  // backdrop follows the active quest's world; neutral on the home hub
  function setWorldTheme(w){
    if(typeof w==='number' && w>=0) document.body.setAttribute('data-world', String(w+1));
    else document.body.removeAttribute('data-world');
  }

  function renderModules(activeId){
    lastActive = activeId;
    const next = MODULES.find(m=>!done[m.id]);
    const focusW = activeId ? worldOf(activeId) : (next ? worldOf(next.id) : 0);
    modulesEl.innerHTML = '<h2 class="pixel">QUEST LOG</h2>' + WORLDS.map((w,wi)=>{
      const open = (wi in openWorlds) ? openWorlds[wi] : wi===focusW;
      const quests = w.ids.map(id=>MODULES.find(m=>m.id===id)).filter(Boolean);
      const cleared = quests.filter(m=>done[m.id]).length;
      return `<button class="world" onclick="App.toggleWorld(${wi})" aria-expanded="${open}">
          <span>${esc(w.title)}</span><span class="wstat">${cleared}/${quests.length} ${open?'&#9662;':'&#9656;'}</span>
        </button>
        ${open?`<div class="wbody">${quests.map(m=>questBtn(m, activeId)).join('')}</div>`:''}`;
    }).join('');
  }

  function toggleWorld(wi){
    const next = MODULES.find(m=>!done[m.id]);
    const focusW = lastActive ? worldOf(lastActive) : (next ? worldOf(next.id) : 0);
    const cur = (wi in openWorlds) ? openWorlds[wi] : wi===focusW;
    openWorlds[wi] = !cur;
    saveProgress();
    renderModules(lastActive);
  }

  function dismissOrient(){
    oriented = true;
    saveProgress();
    goHome();
  }

  function goHome(){
    curWalk = null;
    setWorldTheme(null);
    renderModules(null);
    PIX.setState('idle');
    // resume from saved progress: next uncleared quest, with step when mid-walkthrough
    const next = MODULES.find(m=>!done[m.id]);
    const target = next || MODULES[0];
    const started = Object.keys(done).length>0 || Object.values(stepAt).some(v=>v>0);
    let cta = 'START QUEST 01';
    if(!next) cta = 'REPLAY QUEST 01';
    else if(started){
      cta = `RESUME QUEST ${pad2n(MODULES.indexOf(next)+1)}`;
      const v = stepAt[next.id]||0, N = visibleSteps(next).length;
      if(v>=1 && v<=N) cta += ` &#183; STEP ${pad2n(v)}`;
    }
    const allCleared = MODULES.every(q=>done[q.id]);
    stage.innerHTML = `
      <div class="hero">
        <div class="pixwrap"><div class="pixscreen" style="background:transparent;border:none;box-shadow:none">
          <canvas id="heroPix" width="220" height="220"></canvas>
        </div></div>
        <h3>WORKFLOW <b>ARCADE</b></h3>
        <p>Learn Claude Code inside real work. Set up a project, define the collaboration, add ESF Companion, and finish something you can defend.</p>
        <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px">
          <button class="btn" onclick="App.openModule('${target.id}')">${cta}</button>
          <button class="btn ghost" onclick="App.say('what should I learn first?')">ASK PIXEL</button>
          ${allCleared?`<button class="btn mint" onclick="App.openCert()">GET CERTIFICATE</button>`:''}
        </div>
        ${(oriented && !started && !allCleared)?`<div class="stepmeta" style="margin-top:16px;color:var(--mint)">ORIENTATION DONE &#10003; &#183; QUEST ONE IS READY WHEN YOU ARE</div>`:''}
        ${oriented?'':`<div class="why" style="max-width:560px;text-align:left;margin-top:18px"><b>HOW THIS ARCADE WORKS</b><br>Pick a quest from the map or the log. Each quest walks one step at a time, and every step has a practice pad or a safe simulated terminal. Practicing marks a step done, HINT asks PIXEL for help, CHECK ANSWER reviews the shape of your pad, and + GUIDE keeps any step in your exportable field guide.<div style="margin-top:12px"><button class="btn mint" onclick="App.dismissOrient()">GOT IT</button></div></div>`}
        ${questMapHtml()}
        ${badgeCaseHtml()}
      </div>`;
    mirrorHeroAvatar();
    drawMap();
  }

  /* ---- quest map: an overworld path on the home screen. The canvas paints
     the zone bands and the dotted trail between quests; the node buttons sit
     on top and carry all interaction and accessibility. ---- */
  // node centers as fractions of the canvas, one per MODULES entry, left to right
  const MAP_NODES = [ {x:.08,y:.62}, {x:.20,y:.38}, {x:.34,y:.60}, {x:.48,y:.36}, {x:.62,y:.60}, {x:.76,y:.38}, {x:.90,y:.58} ];

  // the current quest is the first uncleared one; everything before it is cleared
  function mapState(m){
    if(done[m.id]) return 'cleared';
    const next = MODULES.find(q=>!done[q.id]);
    return (next && next.id===m.id) ? 'current' : 'future';
  }

  // build one node button. Named mapNode so the helper reads as a single node.
  const mapNode = (m,i)=>{
    const st = mapState(m);
    const n = MAP_NODES[i] || {x:.5,y:.5};
    const glyph = st==='cleared' ? '&#10003;' : String(i+1).padStart(2,'0');
    const stateLabel = st==='cleared' ? 'cleared' : st==='current' ? 'up next' : 'not started';
    // the current node pulses via the .current CSS class; the reduced-motion block kills that animation globally
    return `<button class="mapnode ${st}" style="left:${(n.x*100).toFixed(2)}%;top:${(n.y*100).toFixed(2)}%"
        onclick="App.openModule('${m.id}')"
        aria-label="Quest ${i+1}: ${esc(m.title)}, ${stateLabel}">
        <span aria-hidden="true">${glyph}</span>
        <span class="nlabel">${esc(m.title)}</span>
      </button>`;
  };

  function questMapHtml(){
    return `<div class="badgewrap">
        <div class="badgehead pixel">QUEST MAP</div>
        <div class="mapwrap">
          <canvas id="mapcv" width="560" height="200" aria-hidden="true"></canvas>
          ${MODULES.map(mapNode).join('')}
        </div>
      </div>`;
  }

  // paint the decorative trail and zone bands. Nodes are drawn by the buttons.
  function drawMap(){
    const cv = document.getElementById('mapcv');
    if(!cv) return;   // map is absent on non-home views
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height;
    ctx.clearRect(0,0,W,H);
    // three zone bands, one per world, with very low-alpha tints
    const tints = ['rgba(255,194,75,.05)','rgba(95,214,166,.05)','rgba(255,138,165,.05)'];
    for(let z=0;z<3;z++){ ctx.fillStyle = tints[z]; ctx.fillRect(z*W/3, 0, W/3, H); }
    // dotted trail: small filled squares stepped along each segment, pixel feel
    const pt = n => ({ x:n.x*W, y:n.y*H });
    for(let i=0;i<MAP_NODES.length-1;i++){
      const a = pt(MAP_NODES[i]), b = pt(MAP_NODES[i+1]);
      const cleared = done[MODULES[i].id] && done[MODULES[i+1].id];
      ctx.fillStyle = cleared ? '#5fd6a6' : '#3a2f5e';
      const dist = Math.hypot(b.x-a.x, b.y-a.y);
      const steps = Math.max(2, Math.round(dist/12));
      for(let s=0;s<=steps;s++){
        const t = s/steps;
        const x = Math.round(a.x + (b.x-a.x)*t);
        const y = Math.round(a.y + (b.y-a.y)*t);
        ctx.fillRect(x-2, y-2, 4, 4);
      }
    }
    // zone titles in tiny Press Start 2P at the top of each band
    const titles = ['WORLD 1','WORLD 2','WORLD 3'];
    const paintTitles = ()=>{
      ctx.fillStyle = '#9a8fc4';
      ctx.font = '8px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      for(let z=0;z<3;z++){ ctx.fillText(titles[z], (z+0.5)*W/3, 18); }
    };
    paintTitles();
    // fonts may load late: repaint the titles once they arrive, no crash if slow
    if(document.fonts && document.fonts.ready) document.fonts.ready.then(()=>{ if(document.getElementById('mapcv')===cv) paintTitles(); });
  }

  // badge case for the home hero: earned badges lit, unearned dim with a lock
  function badgeCaseHtml(){
    const earned = BADGES.filter(b=>badges[b.id]).length;
    return `<div class="badgewrap">
        <div class="badgehead pixel">BADGES <span style="color:var(--amber)">${earned}</span> / ${BADGES.length}</div>
        <div class="badgegrid">${BADGES.map(b=>{
          const got = !!badges[b.id];
          return `<div class="badge ${got?'earned':''}">
              <div class="bt">${got?'':'<span class="lock">&#9632;</span> '}${esc(b.title)}</div>
              <div class="bd">${esc(b.desc)}</div>
            </div>`;
        }).join('')}</div>
      </div>`;
  }

  // draw the same PIX onto the hero canvas by cloning the live one each frame
  function mirrorHeroAvatar(){
    const src = document.getElementById('pix');
    const dst = document.getElementById('heroPix');
    if(!dst) return;
    const dctx = dst.getContext('2d');
    (function loop(){
      // stop if the live hero canvas is no longer this exact node (goHome re-rendered a new one)
      if(document.getElementById('heroPix') !== dst) return;
      dctx.imageSmoothingEnabled=false;
      dctx.clearRect(0,0,dst.width,dst.height);
      dctx.drawImage(src,0,0,dst.width,dst.height);
      if(!reduceMotion) requestAnimationFrame(loop);
    })();
  }

  function openModule(id){
    const m = MODULES.find(x=>x.id===id);
    PIX.nudge();
    if(!m) return;
    setWorldTheme(worldOf(id));
    openWorlds[worldOf(id)] = true;   // opening a quest reveals its world
    renderModules(id);
    if(!m.ready){ renderTeaser(m); return; }
    if(m.branch && !branchChoice[m.id]) renderBranchChoice(m);
    else renderWalk(m, stepAt[m.id]||0);   // resume where the learner left off
    if(window.innerWidth<=980) window.scrollTo({top:0,behavior:'smooth'});
  }

  function renderTeaser(m){
    curWalk = null;
    stage.innerHTML = `
      <div class="lesson">
        <h3 class="title">${esc(m.title)}</h3>
        <div class="why"><b>WHAT THIS IS</b><br>${esc(m.teaser || m.sub)}</div>
        <div style="text-align:center;padding:18px 0">
          <div class="pixel" style="font-size:11px;color:var(--rose);margin-bottom:14px">QUEST LOADING SOON</div>
          <button class="btn ghost" onclick="App.say('tell me about the ${esc(m.title)} quest')">ASK PIXEL ABOUT IT</button>
          <button class="btn" onclick="App.openModule('claude-start')" style="margin-left:10px">PLAY QUEST 01</button>
        </div>
      </div>`;
    pixLine(`That quest is still loading. ${m.title} is worth the wait. Want the gist now?`);
  }

  /* ---- walkthrough: one step at a time, with practice sandbox ----
     View index v: 0 = intro, 1..N = steps, N+1 = finish card. */
  const pad2n = n => String(n).padStart(2,'0');
  const visibleSteps = m => m.steps
    .map((step, originalIndex)=>({step, originalIndex}))
    .filter(item=>!item.step.path || item.step.path===branchChoice[m.id]);

  function renderBranchChoice(m){
    curWalk = null;
    stage.innerHTML = `
      <div class="lesson">
        <h3 class="title">${esc(m.title)}</h3>
        <div class="why"><b>CHOOSE YOUR PATH</b><br>Both paths teach the same stewardship process. The Cowork plugin guides the workflow; manual templates keep the practice tool-agnostic.</div>
        <div class="branch-grid">
          <button class="btn branch-card" onclick="App.choosePath('${m.id}','cowork')"><b>COWORK PLUGIN</b>Guided commands, workspace state, and status checks.</button>
          <button class="btn ghost branch-card" onclick="App.choosePath('${m.id}','manual')"><b>MANUAL TEMPLATES</b>Position, decision records, Five Questions, and disclosure without a plugin.</button>
        </div>
      </div>`;
  }

  function choosePath(id, path){
    const m = MODULES.find(x=>x.id===id);
    if(!m || !m.branch || !m.branch[path]) return;
    branchChoice[id] = path;
    stepAt[id] = 0;
    saveProgress();
    announce(`${m.branch[path]} path selected`);
    renderWalk(m, 0);
  }

  let curWalk = null;   // {id, v} while a walkthrough is on screen; arrow keys navigate

  function renderWalk(m, v){
    const N = visibleSteps(m).length;
    v = Math.max(0, Math.min(v, N+1));
    curWalk = {id:m.id, v};
    stepAt[m.id] = v; saveProgress();
    if(v===0) return renderIntro(m);
    if(v>N) return renderFinish(m);
    renderStep(m, v);
  }

  function dotsHtml(m, v){
    return '<div class="wdots">'+visibleSteps(m).map(({step, originalIndex},i)=>{
      const pr = (practiced[m.id]||{})[originalIndex];
      return `<i class="${v===i+1?'on':(pr?'pr':'')}" title="${pad2n(i+1)}: ${esc(step.h)}"></i>`;
    }).join('')+'</div>';
  }

  function renderIntro(m){
    stage.innerHTML = `
      <div class="lesson">
        <h3 class="title">${esc(m.title)}</h3>
        <div class="why"><b>WHY THIS MATTERS</b><br>${esc(m.why)}</div>
        ${dotsHtml(m,0)}
        ${m.branch?`<div class="stepmeta">PATH: ${esc(m.branch[branchChoice[m.id]])} <button class="btn ghost" style="padding:7px;font-size:7px" onclick="App.changePath('${m.id}')">CHANGE PATH</button></div>`:''}
        <p style="color:var(--muted)">${visibleSteps(m).length} steps, one at a time. Each step has a practice sandbox. Practicing marks the step done, and the XP just tracks what you have practiced.</p>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <button class="btn" onclick="App.walk('${m.id}',1)">START STEPS</button>
          <button class="btn ghost" onclick="App.walk('${m.id}',${visibleSteps(m).length+1})">SKIP TO CHECKPOINT</button>
        </div>
      </div>`;
  }

  function renderStep(m, v){
    const items = visibleSteps(m);
    const N = items.length;
    const {step:s, originalIndex} = items[v-1];
    const isPr = (practiced[m.id]||{})[originalIndex];
    stage.innerHTML = `
      <div class="lesson">
        <h3 class="title">${esc(m.title)}</h3>
        <div class="stepmeta">${s.where?`<span class="where pixel">${esc(WHERE_LABELS[s.where]||s.where)}</span>`:''}STEP ${pad2n(v)} / ${pad2n(N)} <span class="pr" id="prtag">${isPr?'PRACTICED &#10003;':''}</span></div>
        ${dotsHtml(m,v)}
        <div class="st" style="font-size:13px;margin:16px 0 8px">${esc(s.h)}</div>
        <div style="font-size:21px">${esc(s.b)}</div>
        ${s.code?`<div class="codewrap"><pre class="code">${esc(s.code)}</pre><button class="copy" onclick="App.copyCode(this)" aria-label="Copy to clipboard">COPY</button></div>`:''}
        ${s.see?`<div class="see">&#9656; You should see: ${esc(s.see)}</div>`:''}
        ${sandboxHtml(m, originalIndex, s)}
        ${s.file?fileBoxHtml(m, originalIndex, s):''}
        ${s.explain?explainHtml(m, originalIndex, s):''}
        <div class="walknav">
          <button class="btn ghost" onclick="App.walk('${m.id}',${v-1})">&#9664; BACK</button>
          <button class="btn ghost" onclick="App.hint('${m.id}',${originalIndex})">HINT</button>
          <button class="btn ghost" id="gsave" onclick="App.toggleGuideStep('${m.id}',${originalIndex})">${guide.includes(m.id+':'+originalIndex)?'IN GUIDE &#10003;':'+ GUIDE'}</button>
          <button class="btn next" onclick="App.walk('${m.id}',${v+1})">${v===N?'FINISH':'NEXT'} &#9654;</button>
        </div>
      </div>`;
    wireSandbox(m, originalIndex, s);
  }

  /* ---- on-your-machine panel: where a step's artifact lives, plus a
     real download built from the learner's pad text. The app cannot
     write into the project folder; the learner places the file. ---- */
  // sim state panel: lines starting with * render amber (changed state)
  function renderScene(lines){
    return lines.map(l=>l.startsWith('*')?'<b>'+esc(l.slice(1))+'</b>':esc(l)).join('\n');
  }

  function fileTree(f){
    const paths = f.paths || [f.path];
    const mark = ' <b>&#8592; '+esc(f.mark||'THIS STEP')+'</b>';
    let out = '~/projects/my-first-claude-project/\n';
    out += '&#9500;&#9472;&#9472; CLAUDE.md' + (paths.includes('CLAUDE.md')?mark:'') + '\n';
    const esf = paths.filter(p=>p.startsWith('esf/'));
    const root = paths.filter(p=>p!=='CLAUDE.md' && !p.startsWith('esf/'));
    if(esf.length){
      out += '&#9500;&#9472;&#9472; esf/\n';
      esf.forEach((p,i)=>{ out += '&#9474;   '+(i===esf.length-1?'&#9492;':'&#9500;')+'&#9472;&#9472; '+esc(p.slice(4))+mark+'\n'; });
    }
    root.forEach((p,i)=>{ out += (i===root.length-1?'&#9492;':'&#9500;')+'&#9472;&#9472; '+esc(p)+mark+'\n'; });
    if(!root.length) out += '&#9492;&#9472;&#9472; ...\n';
    return out.trimEnd();
  }

  function fileBoxHtml(m, idx, s){
    const f = s.file;
    const dlName = f.name || (f.path||'').split('/').pop();
    const note = f.note || (f.head ? 'Then move it into your project folder, or ask Claude to save it as '+f.path+'.' : '');
    return `<div class="sandbox">
      <div class="sbtitle" style="color:var(--mint)">ON YOUR MACHINE <span class="sbhint">${f.head?'built from your pad text':'what this creates'}</span></div>
      <pre class="ftree">${fileTree(f)}</pre>
      <div class="egwrap">
        ${f.head?`<button class="egbtn check" onclick="App.downloadStepFile('${m.id}',${idx})">DOWNLOAD ${esc(dlName).toUpperCase()}</button>`:''}
        ${note?`<div style="font-size:18px;color:var(--muted);margin-top:${f.head?'8px':'0'}">${esc(note)}</div>`:''}
      </div>
    </div>`;
  }

  // Self-explanation prompt: a one-line reflection saved beside the pad
  // under a :why-suffixed key, so no new persistence field is needed.
  function explainHtml(m, idx, s){
    return `<div class="sandbox">
      <div class="sbtitle">WHY THIS WORKS <span class="sbhint">one line, in your own words. optional, saved to your guide</span></div>
      <textarea id="whyin" placeholder="${esc(s.explain)}" aria-label="why this works">${esc(pads[m.id+':'+idx+':why']||'')}</textarea>
    </div>`;
  }

  function downloadStepFile(mid, idx){
    const m = MODULES.find(x=>x.id===mid);
    if(!m) return;
    const f = m.steps[idx] && m.steps[idx].file;
    if(!f || !f.head) return;
    const text = (pads[mid+':'+idx]||'').trim();
    if(!text){ toast('WRITE IN THE PAD FIRST'); return; }
    const blob = new Blob([f.head + text + '\n'], {type:'text/markdown'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = f.name || f.path.split('/').pop();
    a.click();
    URL.revokeObjectURL(a.href);
    toast('FILE DOWNLOADED');
    announce('file downloaded: '+a.download);
  }

  function sandboxHtml(m, idx, s){
    if(s.sim) return `
      <div class="sandbox">
        <div class="sbtitle">PRACTICE TERMINAL <span class="sbhint">simulated and safe. Type or paste a command, then press Enter to run it. Type help for options.</span></div>
        ${s.scene?`<pre class="ftree simviz" id="simviz">${renderScene(s.scene)}</pre>`:''}
        <div class="termout" id="termout"></div>
        <div class="termrow"><span class="prompt">${s.where==='claude'?'&gt;':'$'}</span><input id="termin" autocomplete="off" spellcheck="false" aria-label="practice terminal input, press Enter to run" placeholder="type a command, then press Enter"></div>
      </div>`;
    if(s.pad) return `
      <div class="sandbox">
        <div class="sbtitle">PRACTICE PAD <span class="sbhint" id="padhint">saved on this device</span></div>
        <textarea id="padin" placeholder="${esc(s.pad)}" aria-label="practice pad">${esc(pads[m.id+':'+idx]||'')}</textarea>
        <div class="egwrap">
          <button class="egbtn check" onclick="App.checkPad('${m.id}',${idx})">CHECK ANSWER</button>
          ${s.eg?`<button class="egbtn" onclick="App.toggleEg(this)" aria-expanded="false">SHOW EXAMPLE</button><div class="eg" hidden>${esc(s.eg)}</div>`:''}
          <div class="padfb" id="padfb" aria-live="polite"></div>
        </div>
      </div>`;
    return '';
  }

  function wireSandbox(m, idx, s){
    if(s.sim){
      const out = document.getElementById('termout');
      const input = document.getElementById('termin');
      if(!input) return;
      const echo = (t,cls)=>{ const d=document.createElement('div'); if(cls) d.className=cls; d.textContent=t; out.appendChild(d); out.scrollTop=out.scrollHeight; };
      const glyph = s.where==='claude' ? '>' : '$';
      let lastCmd='', misses=0;
      echo('sim terminal ready. Commands are simulated. Nothing runs on your machine.','dim');
      input.addEventListener('keydown', e=>{
        if(e.key==='ArrowUp'){ input.value=lastCmd; e.preventDefault(); return; }
        if(e.key!=='Enter') return;
        const raw = input.value.trim(); input.value='';
        if(!raw) return;
        lastCmd=raw;
        echo(glyph+' '+raw,'cmd');
        const n = raw.toLowerCase().replace(/\s+/g,' ');
        if(n==='clear'){ out.innerHTML=''; return; }
        if(n==='help'){ echo('This step recognizes:\n'+s.sim.map(r=>'  '+(r.name||r.req.join(' '))).join('\n')); return; }
        const rule = s.sim.find(r=>r.req.every(q=>n.includes(q)));
        if(rule){ misses=0; echo(rule.out); if(rule.scene){ const vz=document.getElementById('simviz'); if(vz) vz.innerHTML=renderScene(rule.scene); } if(rule.key) markPracticed(m, idx); }
        else if(++misses>=2){
          const keyRule = s.sim.find(r=>r.key)||s.sim[0];
          echo('sim: not recognized. This step expects:\n  '+(keyRule.name||keyRule.req.join(' ')),'dim');
        }
        else echo('sim: not recognized here. Type "help" to see what this step expects.','dim');
      });
    }
    if(s.pad){
      const ta = document.getElementById('padin');
      if(!ta) return;
      const key = m.id+':'+idx;
      const hintEl = document.getElementById('padhint');
      const updateHint = ()=>{
        if(!hintEl) return;
        const len = ta.value.trim().length;
        const banked = (practiced[m.id]||{})[idx];
        hintEl.textContent = (banked || !len) ? 'saved on this device'
          : len<20 ? 'saved. keep writing, then check your answer'
          : 'saved. press CHECK ANSWER to bank XP';
      };
      updateHint();
      ta.addEventListener('input', ()=>{
        pads[key]=ta.value;
        saveProgress();
        updateHint();
      });
    }
    if(s.explain){
      const wy = document.getElementById('whyin');
      if(wy){ const wk = m.id+':'+idx+':why'; wy.addEventListener('input', ()=>{ pads[wk]=wy.value; saveProgress(); }); }
    }
  }

  function markPracticed(m, idx){
    practiced[m.id] = practiced[m.id]||{};
    if(practiced[m.id][idx]) return;
    practiced[m.id][idx] = true;
    xp += 5;
    xpEl.textContent = xp;
    saveProgress();
    toast('STEP PRACTICED ✓   +5 XP');
    sfxPractice();
    PIX.celebrate();
    const tag = document.getElementById('prtag');
    if(tag) tag.innerHTML = 'PRACTICED &#10003;';
    if(m.id==='recover' && m.steps[idx] && m.steps[idx].h==='Revert the file you do not want') award('restored');
  }

  function renderFinish(m){
    const cleared = done[m.id];
    const items = visibleSteps(m);
    const prCount = items.filter(({originalIndex})=>(practiced[m.id]||{})[originalIndex]).length;
    stage.innerHTML = `
      <div class="lesson">
        <h3 class="title">${esc(m.title)}</h3>
        ${dotsHtml(m, items.length+1)}
        <div class="stepmeta" style="margin-top:10px">${prCount} / ${items.length} STEPS PRACTICED &#183; ${items.filter(({originalIndex})=>(pads[m.id+':'+originalIndex]||'').trim()).length} NOTES WRITTEN</div>
        ${m.recall?recallHtml(m):''}
        <div class="tryit"><b>TRY IT</b><br>${esc(m.tryit)}</div>
        <div class="checkpoint">
          <button class="btn ${cleared?'ghost':'mint'}" onclick="App.complete('${m.id}')">
            ${cleared?'CLEARED &#10003;':'MARK QUEST COMPLETE'}
          </button>
          <span style="color:var(--muted);font-size:18px">${esc(m.checkpoint)}</span>
        </div>
        <div class="walknav">
          <button class="btn ghost" onclick="App.walk('${m.id}',${items.length})">&#9664; BACK TO STEPS</button>
          ${m.learn?`<a class="btn ghost" style="text-decoration:none" href="${m.learn.url}" target="_blank" rel="noopener">LEARN MORE: ${esc(m.learn.label).toUpperCase()} &#8599;</a>`:''}
          ${Object.keys(done).length===MODULES.length?`<button class="btn mint" onclick="App.openCert()">GET CERTIFICATE</button>`:''}
        </div>
      </div>`;
  }

  /* ---- boss check: end-of-quest recall. The learner reproduces each
     answer from memory, rates confidence, reveals to self-score, and can
     retry. recallCard returns one card so a single card re-renders in
     place after scoring, never the whole finish card, so other inputs
     are not lost. XP is awarded once per item via a sticky awarded flag,
     so retry cannot farm it. ---- */
  function recallCard(m, i){
    const it = m.recall[i];
    const st = recallState[m.id+':'+i] || {};
    const scored = st.scored;
    const conf = st.conf;
    const cbtn = (val,label)=>`<button class="egbtn rconf ${conf===val?'sel':''}" onclick="App.setRecallConf('${m.id}',${i},'${val}',this)">${label}</button>`;
    return `<div class="sandbox rcard" id="rcard-${i}">
        <div class="sbtitle">RECALL ${i+1} <span class="sbhint">from memory, no peeking</span></div>
        <div style="padding:10px 12px">
          <div style="font-size:20px;margin-bottom:8px">${esc(it.q)}</div>
          <input class="rin" id="rin-${i}" autocomplete="off" spellcheck="false" aria-label="your answer from memory" placeholder="type it from memory" ${scored?'disabled':''}>
          <div class="rconfrow" style="margin-top:8px"${scored?' hidden':''}>
            <span class="sbhint">how sure?</span> ${cbtn('guess','GUESS')} ${cbtn('fairly','FAIRLY')} ${cbtn('sure','SURE')}
            <button class="egbtn check" onclick="App.revealRecall('${m.id}',${i})">REVEAL</button>
          </div>

  const wait = ms => new Promise(r=>setTimeout(r, ms));

  async function say(text){
    if(busy) return;

    inputEl.value='';
    busy=true;
    if(window.innerWidth<=980) setChatOpen(true);   // replies land in a hidden panel otherwise

    await wait(350 + Math.random()*300);
    bubble.remove();

  // Scripted structural check. PIXEL is offline, so this verifies that

  function checkPad(mid, idx){
    const m = MODULES.find(x=>x.id===mid);
    if(!m) return;
    const s = m.steps[idx];
    const ta = document.getElementById('padin');
    const fb = document.getElementById('padfb');
    if(!ta || !fb) return;
    const text = ta.value.trim();
    if(text.length<20){
      fb.className='padfb miss';
      fb.textContent='Write a little more first. One or two full sentences give the check something to work with.';
      return;
    }
    const low = text.toLowerCase();
    const missing = (s.check||[]).filter(g=>!g.any.some(t=>low.includes(t))).map(g=>g.label);
    if(missing.length){
      fb.className='padfb miss';
      fb.textContent='This check reads structure, not understanding. Not found yet: '+missing.join(', ')+'.';
      return;
    }
    fb.className='padfb ok';
    fb.textContent = (s.check&&s.check.length)
      ? 'Structure check passed: '+s.check.map(g=>g.label).join(', ')+'. Real validation happens when you test it with Claude.'
      : 'Saved and substantial. Real validation happens when you test it with Claude.';
    markPracticed(m, idx);
    if(mid==='work-profile' && s.h==='Draft the profile section') award('profiled');
    if(mid==='first-project' && s.h==='Draft the disclosure') award('disclosed');

  }

  function drawCert(name){
    const cv = document.getElementById('certcv');
    if(!cv) return;
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height;
    // background
    ctx.fillStyle = '#1a1530'; ctx.fillRect(0,0,W,H);
    // double pixel border: thick outer dark, thin inner amber
    ctx.fillStyle = '#0d0a1c'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#1a1530'; ctx.fillRect(16,16,W-32,H-32);
    ctx.fillStyle = '#ffc24b'; ctx.fillRect(28,28,W-56,4); ctx.fillRect(28,H-32,W-56,4);
    ctx.fillRect(28,28,4,H-56); ctx.fillRect(W-32,28,4,H-56);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffc24b';
    ctx.font = '16px "Press Start 2P", monospace';
    ctx.fillText('WORKFLOW ARCADE', W/2, 96);
    ctx.fillStyle = '#efe9ff';
    ctx.font = '14px "Press Start 2P", monospace';
    ctx.fillText('CERTIFICATE OF COMPLETION', W/2, 150);
    ctx.fillStyle = '#5fd6a6';
    ctx.font = '30px "Press Start 2P", monospace';
    const who = (name||'').trim().toUpperCase() || 'ARCADE PLAYER';
    ctx.fillText(who.slice(0,22), W/2, 250);
    ctx.fillStyle = '#9a8fc4';
    ctx.font = '14px "Press Start 2P", monospace';
    ctx.fillText('CLEARED ALL SEVEN QUESTS', W/2, 318);
    ctx.fillStyle = '#efe9ff';
    ctx.font = '12px "Press Start 2P", monospace';
    ctx.fillText(xp + ' XP   ' + new Date().toLocaleDateString(), W/2, 366);
    // small pixel face of PIXEL in the lower-left corner (8x8 block grid)
    drawCertFace(ctx, 60, 392);
  }

  // simplified 8x8 PIXEL face built from fillRect blocks
  function drawCertFace(ctx, ox, oy){
    const u = 8;
    const put = (x,y,c)=>{ ctx.fillStyle=c; ctx.fillRect(ox+x*u, oy+y*u, u, u); };
    const body='#5a5390', screen='#0d0a1c', glow='#5fd6a6';
    for(let y=0;y<8;y++) for(let x=0;x<8;x++) put(x,y,body);   // body block
    for(let y=2;y<6;y++) for(let x=1;x<7;x++) put(x,y,screen); // inset screen
    put(2,3,glow); put(5,3,glow);                              // eyes
    put(2,5,glow); put(3,5,glow); put(4,5,glow); put(5,5,glow);// smile
  }

  /* ---- 8-bit sound: synthesized, no assets, default off ---- */
  let actx = null;
  function beep(freq, dur, delay){
    if(!soundOn) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    actx = actx || new AC();
    const t = actx.currentTime + (delay||0);
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'square'; o.frequency.value = freq;
    g.gain.setValueAtTime(.05, t);
    g.gain.exponentialRampToValueAtTime(.001, t + dur);
    o.connect(g).connect(actx.destination);
    o.start(t); o.stop(t + dur);
  }
  function sfxPractice(){ beep(880, .09); }
  function sfxClear(){ beep(523, .1); beep(659, .1, .1); beep(784, .18, .2); }
  function toggleSound(){

  /* ---- ambient music: synthesized chords, no assets, default off.
     This is a mellow generative loop, not licensed lofi tracks. ---- */
  let musicTimer = null, musicGain = null, musicStep = 0;
  // four mellow seventh chords (Hz), looped slowly
  const CHORDS = [
    [220.00, 261.63, 329.63, 392.00],
    [196.00, 246.94, 293.66, 349.23],
    [174.61, 220.00, 277.18, 329.63],
    [196.00, 246.94, 293.66, 392.00]
  ];
  function musicCtx(){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return null;
    actx = actx || new AC();
    return actx;
  }
  function musicChord(ctx, freqs, t, dur){
    freqs.forEach((f,i)=>{
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = i===0 ? 'sine' : 'triangle';
      o.frequency.value = f;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.9/freqs.length, t+0.5);   // soft swell
      g.gain.linearRampToValueAtTime(0.0001, t+dur);             // long release
      o.connect(g).connect(musicGain);
      o.start(t); o.stop(t+dur+0.1);
    });
  }
  function musicTick(){
    const ctx = musicCtx(); if(!ctx) return;
    const dur = 3.6;
    musicChord(ctx, CHORDS[musicStep % CHORDS.length], ctx.currentTime, dur);
    musicStep++;
    musicTimer = setTimeout(musicTick, dur*1000);
  }
  function startMusic(){
    const ctx = musicCtx(); if(!ctx) return;
    if(ctx.state === 'suspended') ctx.resume();
    if(!musicGain){ musicGain = ctx.createGain(); musicGain.connect(ctx.destination); }
    musicGain.gain.value = (musicVol/100) * 0.35;
    if(!musicTimer) musicTick();
  }
  function stopMusic(){
    if(musicTimer){ clearTimeout(musicTimer); musicTimer = null; }
    if(musicGain) musicGain.gain.value = 0;
  }
  function toggleMusic(){
    musicOn = !musicOn;
    saveProgress();
    const b = document.getElementById('musbtn');
    if(b) b.textContent = 'MUSIC: ' + (musicOn?'ON':'OFF');
    if(musicOn) startMusic(); else stopMusic();
  }
  function setMusicVol(v){
    musicVol = Math.max(0, Math.min(100, Number(v)||0));
    saveProgress();

  }
